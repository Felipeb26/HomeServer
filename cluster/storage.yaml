# big_storage — HDD SATA 1.8TB — mídia e downloads
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-big-storage
  labels:
    type: local
    drive: big-storage
spec:
  storageClassName: local-path
  capacity:
    storage: 1700Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/big_storage
---
