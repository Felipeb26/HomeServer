apiVersion: v1
kind: Namespace
metadata:
  name: cluster-tools
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-cleanup
  namespace: cluster-tools
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-cleanup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-cleanup
subjects:
  - kind: ServiceAccount
    name: cluster-cleanup
    namespace: cluster-tools
roleRef:
  kind: ClusterRole
  name: cluster-cleanup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-cleanup-script
  namespace: cluster-tools
data:
  cleanup.sh: |
    #!/bin/sh
    set -eu

    echo "===== [$(date)] Iniciando limpeza do cluster ====="

    echo "--- Removendo pods Succeeded (Completed) ---"
    kubectl get pods --all-namespaces --field-selector=status.phase==Succeeded -o json \
      | jq -r '.items[] | "\(.metadata.namespace) \(.metadata.name)"' \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando pod $name (ns=$ns)"
          kubectl delete pod "$name" -n "$ns" --ignore-not-found=true
        done

    echo "--- Removendo pods Failed ---"
    kubectl get pods --all-namespaces --field-selector=status.phase==Failed -o json \
      | jq -r '.items[] | "\(.metadata.namespace) \(.metadata.name)"' \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando pod $name (ns=$ns)"
          kubectl delete pod "$name" -n "$ns" --ignore-not-found=true
        done

    echo "--- Removendo pods Evicted / UnexpectedAdmissionError / NodeAffinity ---"
    kubectl get pods --all-namespaces -o json \
      | jq -r '.items[] | select(.status.reason=="Evicted" or .status.reason=="UnexpectedAdmissionError" or .status.reason=="NodeAffinity" or .status.reason=="OutOfpods") | "\(.metadata.namespace) \(.metadata.name)"' \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando pod $name (ns=$ns) - motivo especial"
          kubectl delete pod "$name" -n "$ns" --ignore-not-found=true
        done

    echo "--- Removendo pods em CrashLoopBackOff/Error com todos os containers travados há muito tempo (> 6h) ---"
    kubectl get pods --all-namespaces -o json \
      | jq -r --arg cutoff "$(date -u -d '6 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-6H +%Y-%m-%dT%H:%M:%SZ)" \
        '.items[] | select(.status.phase=="Running" or .status.phase=="Pending") | select(.status.containerStatuses != null) | select([.status.containerStatuses[]? | .state.waiting.reason=="CrashLoopBackOff" or .state.waiting.reason=="ImagePullBackOff" or .state.waiting.reason=="ErrImagePull"] | any) | select(.metadata.creationTimestamp < $cutoff) | "\(.metadata.namespace) \(.metadata.name)"' \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando pod travado há mais de 6h: $name (ns=$ns)"
          kubectl delete pod "$name" -n "$ns" --ignore-not-found=true
        done

    echo "--- Removendo ReplicaSets vazios (0 desejados / 0 atuais) ---"
    kubectl get rs --all-namespaces -o json \
      | jq -r '.items[] | select((.spec.replicas // 0) == 0 and (.status.replicas // 0) == 0) | "\(.metadata.namespace) \(.metadata.name)"' \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando ReplicaSet vazio $name (ns=$ns)"
          kubectl delete rs "$name" -n "$ns" --ignore-not-found=true
        done

    echo "--- Removendo ReplicaSets orfaos (owner Deployment nao existe mais) ---"
    kubectl get rs --all-namespaces -o json \
      | jq -r '.items[] | select(.metadata.ownerReferences != null) | select(.metadata.ownerReferences[0].kind=="Deployment") | "\(.metadata.namespace) \(.metadata.name) \(.metadata.ownerReferences[0].name)"' \
      | while read -r ns name owner; do
          [ -z "$ns" ] && continue
          if ! kubectl get deployment "$owner" -n "$ns" >/dev/null 2>&1; then
            echo "Deletando ReplicaSet orfao $name (ns=$ns, owner ausente: $owner)"
            kubectl delete rs "$name" -n "$ns" --ignore-not-found=true
          fi
        done

    echo "--- Removendo Jobs completados ha mais de 24h ---"
    kubectl get jobs --all-namespaces -o json \
      | jq -r '.items[] | select(.status.succeeded >= 1) | "\(.metadata.namespace) \(.metadata.name) \(.status.completionTime // "")"' \
      | while read -r ns name completion; do
          [ -z "$ns" ] || [ -z "$completion" ] && continue
          echo "Deletando Job completado $name (ns=$ns)"
          kubectl delete job "$name" -n "$ns" --ignore-not-found=true
        done

    echo "===== [$(date)] Limpeza concluida ====="
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-cleanup
  namespace: cluster-tools
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        spec:
          serviceAccountName: cluster-cleanup
          restartPolicy: Never
          containers:
            - name: cleanup
              image: alpine/k8s:1.30.2
              command: ["/bin/sh", "/scripts/cleanup.sh"]
              volumeMounts:
                - name: script
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: script
              configMap:
                name: cluster-cleanup-script
                defaultMode: 0755
