apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: "10.1.2"
    helm:
      values: |
        server:
          extraArgs:
            - --insecure
        configs:
          params:
            server.insecure: true
          cm:
            # Ignora diferenças em campos .status dos recursos Kubernetes.
            # Evita erros como:
            # ".status.terminatingReplicas: field not declared in schema"
            resource.compareoptions: |
              ignoreResourceStatusField: all
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
