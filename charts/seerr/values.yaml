image:
  repository: ghcr.io/seerr-team/seerr
  tag: latest

initContainers: true

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 525Mi
    cpu: 200m

persistence:
  config:
    enabled: true
    existingClaim: pvc-seerr-config
    mountPath: /app/config

service:
  port: 5055

livenessProbe:
  httpGet:
    path: /api/v1/status
    port: 5055
  initialDelaySeconds: 20
  timeoutSeconds: 3
  periodSeconds: 15
  failureThreshold: 3

env:
  TZ: America/Sao_Paulo
  PUID: "1000"
  PGID: "1000"
