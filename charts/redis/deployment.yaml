apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-shared
  namespace: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-shared
  template:
    metadata:
      labels:
        app: redis-shared
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --maxmemory
            - 400mb
            - --maxmemory-policy
            - allkeys-lru
            - --appendonly
            - "yes"
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: TZ
              value: America/Sao_Paulo
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /mnt/ext_ssh_bk/redis_data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: redis-shared
  namespace: core
spec:
  selector:
    app: redis-shared
  ports:
    - port: 6379
      targetPort: 6379