apiVersion: v1
kind: PersistentVolume
metadata:
  name: nexus-pv
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  hostPath:
    path: /mnt/seagate-2tb/nexus
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-pvc
  namespace: development
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
  volumeName: nexus-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  namespace: development
spec:
  replicas: 0
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      securityContext:
        fsGroup: 200
      containers:
        - name: nexus
          image: sonatype/nexus3:3.94.0
          securityContext:
            runAsUser: 200
            runAsGroup: 200
            runAsNonRoot: true
          env:
            - name: INSTALL4J_ADD_VM_PARAMS
              value: -Xms1g -Xmx1g -XX:MaxDirectMemorySize=2g
            - name: JAVA_OPTS
              value: -Djetty.http.forwarded=true -Djava.util.prefs.userRoot=/nexus-data/javaprefs
          ports:
            - name: ui
              containerPort: 8081
            - name: docker
              containerPort: 5000
          volumeMounts:
            - name: nexus-data
              mountPath: /nexus-data
            - name: nexus-tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 500Mi
            limits:
              cpu: 1
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: nexus-data
          persistentVolumeClaim:
            claimName: nexus-pvc
        - name: nexus-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nexus
  namespace: development
spec:
  selector:
    app: nexus
  ports:
    - name: ui
      port: 8081
      targetPort: 8081
    - name: docker
      port: 5000
      targetPort: 5000
