apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      securityContext:
        fsGroup: 200
      containers:
        - name: nexus
          image: sonatype/nexus3:3.84.1
          securityContext:
            runAsUser: 200
            runAsGroup: 200
            runAsNonRoot: true
          env:
            - name: INSTALL4J_ADD_VM_PARAMS
              value: "-Xms1g -Xmx1g -XX:MaxDirectMemorySize=2g"
            - name: NEXUS_CONTEXT
              value: /
            - name: JAVA_OPTS
              value: "-Djetty.http.forwarded=true"
            - name: NEXUS_DATA
              value: /nexus-data
          ports:
            - name: ui
              containerPort: 8081
            - name: docker
              containerPort: 5000
          volumeMounts:
            - name: nexus-data
              mountPath: /nexus-data
            - name: nexus-tmp
              mountPath: /tmp
          resources:
            requests:
              memory: 2Gi
              cpu: 250m
            limits:
              memory: 4Gi
              cpu: 2
      volumes:
        - name: nexus-data
          persistentVolumeClaim:
            claimName: nexus-pvc
        - name: nexus-tmp
          emptyDir: {}
