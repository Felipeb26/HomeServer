---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redisinsight
  namespace: monitoring
  labels:
    app: redisinsight
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redisinsight
  strategy:
    type: Recreate
    rollingUpdate: null
  template:
    metadata:
      labels:
        app: redisinsight
    spec:
      containers:
        - name: redisinsight
          image: redis/redisinsight:latest
          ports:
            - containerPort: 5540
          env:
            - name: RI_TELEMETRY_DISABLE
              value: "true"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: redisinsight
  namespace: monitoring
spec:
  selector:
    app: redisinsight
  ports:
    - name: http
      port: 5540
      targetPort: 5540