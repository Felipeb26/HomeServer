apiVersion: apps/v1
kind: Deployment
metadata:
  name: redisinsight
  namespace: monitoring
  labels:
    app: redisinsight
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redisinsight
  strategy:
    type: Recreate
    rollingUpdate: null
  template:
    metadata:
      labels:
        app: redisinsight
    spec:
      containers:
        - name: redisinsight
          image: redis/redisinsight:3.8
          ports:
            - containerPort: 5540
          env:
            - name: RI_TELEMETRY_DISABLE
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5540
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5540
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 2
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: redisinsight
  namespace: monitoring
spec:
  selector:
    app: redisinsight
  ports:
    - name: http
      port: 5540
      targetPort: 5540
