---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lingarr
  namespace: media
  labels:
    app: lingarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lingarr
  template:
    metadata:
      labels:
        app: lingarr
    spec:
      initContainers:
        - name: wait-for-sonarr
          image: busybox:1.38
          command: ["sh", "-c", "until nc -z sonarr 8989; do echo 'Aguardando sonarr...'; sleep 5; done"]
        - name: wait-for-radarr
          image: busybox:1.38
          command: ["sh", "-c", "until nc -z radarr 7878; do echo 'Aguardando radarr...'; sleep 5; done"]
      containers:
        - name: lingarr
          image: lingarr/lingarr:main
          ports:
            - containerPort: 8080
          env:
            - name: TZ
              value: America/Sao_Paulo
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: media
              mountPath: /data
      volumes:
        - name: config
          hostPath:
            path: /mnt/seagate-2tb/arr/ingarr
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: /mnt/red-wd/Torrent
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: lingarr
  namespace: media
spec:
  selector:
    app: lingarr
  ports:
    - port: 8080
      targetPort: 8080