apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lingarr
  namespace: media
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: nginx
  rules:
    - host: lingarr.batsworks.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lingarr
                port:
                  number: 8080
  tls:
    - hosts:
        - lingarr.batsworks.com.br
      secretName: tls-lingarr
