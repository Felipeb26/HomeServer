apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: consul-secret
  namespace: development
spec:
  encryptedData:
    CONSUL_LOCAL_CONFIG: 
  template:
    metadata:
      name: consul-secret
      namespace: development
    type: Opaque
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      containers:
        - name: consul
          image: hashicorp/consul:1.22.7
          ports:
            - containerPort: 8500
              name: http
            - containerPort: 8600
              name: dns
              protocol: UDP
          env:
            - name: TZ
              value: America/Sao_Paulo
            - name: GOGC
              value: "80"
            - name: CONSUL_LOCAL_CONFIG
              valueFrom:
                secretKeyRef:
                  name: consul-secret
                  key: CONSUL_LOCAL_CONFIG
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /v1/status/leader
              port: 8500
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /v1/status/leader
              port: 8500
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /consul/data
      volumes:
        - name: data
          hostPath:
            path: /mnt/seagate-2tb/consul
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: consul
  namespace: development
spec:
  selector:
    app: consul
  ports:
    - name: http
      port: 8500
      targetPort: 8500
    - name: dns
      port: 8600
      targetPort: 8600
      protocol: UDP
