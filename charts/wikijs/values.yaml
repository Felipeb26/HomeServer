image:
  repository: ghcr.io/requarks/wiki
  tag: 2

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 768Mi
    cpu: 500m

persistence:
  data:
    enabled: true
    existingClaim: pvc-wikijs-data

env:
  TZ: America/Sao_Paulo
  DB_TYPE: postgres
  DB_HOST: postgres-shared.core.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: wikijs
  DB_USER: wikijs
  DB_PASS:
    valueFrom:
      secretKeyRef:
        name: postgres-secret
        key: password
