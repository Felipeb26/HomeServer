apiVersion: v1
kind: Namespace
metadata:
  name: cluster-tools
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-cleanup
  namespace: cluster-tools
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-cleanup
rules:
  - apiGroups:
      - ''
    resources:
      - pods
    verbs:
      - get
      - list
      - delete
  - apiGroups:
      - apps
    resources:
      - replicasets
      - deployments
    verbs:
      - get
      - list
      - delete
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-cleanup
subjects:
  - kind: ServiceAccount
    name: cluster-cleanup
    namespace: cluster-tools
roleRef:
  kind: ClusterRole
  name: cluster-cleanup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-cleanup-script
  namespace: cluster-tools
data:
  cleanup.sh: |
    #!/bin/sh
    set -eu

    echo "===== [$(date)] Iniciando limpeza do cluster ====="

    TMP_PODS=$(mktemp)
    TMP_DEPLOYS=$(mktemp)
    trap 'rm -f "$TMP_PODS" "$TMP_DEPLOYS"' EXIT

    # --- Uma unica listagem de pods, reutilizada em todos os filtros abaixo ---
    echo "--- Coletando pods (uma unica chamada) ---"
    kubectl get pods --all-namespaces -o json > "$TMP_PODS"

    echo "--- Removendo pods Succeeded (Completed) ---"
    jq -r '.items[] | select(.status.phase=="Succeeded") | "\(.metadata.namespace) \(.metadata.name)"' "$TMP_PODS" \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando pod $name (ns=$ns)"
          kubectl delete pod "$name" -n "$ns" --ignore-not-found=true
        done

    echo "--- Removendo pods Failed ---"
    jq -r '.items[] | select(.status.phase=="Failed") | "\(.metadata.namespace) \(.metadata.name)"' "$TMP_PODS" \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando pod $name (ns=$ns)"
          kubectl delete pod "$name" -n "$ns" --ignore-not-found=true
        done

    echo "--- Removendo pods Evicted / UnexpectedAdmissionError / NodeAffinity ---"
    jq -r '.items[] | select(.status.reason=="Evicted" or .status.reason=="UnexpectedAdmissionError" or .status.reason=="NodeAffinity" or .status.reason=="OutOfpods") | "\(.metadata.namespace) \(.metadata.name)"' "$TMP_PODS" \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando pod $name (ns=$ns) - motivo especial"
          kubectl delete pod "$name" -n "$ns" --ignore-not-found=true
        done

    echo "--- Removendo pods em CrashLoopBackOff/Error travados ha mais de 6h ---"
    cutoff_6h=$(date -u -d @$(( $(date +%s) - 6*3600 )) +%Y-%m-%dT%H:%M:%SZ)
    jq -r --arg cutoff "$cutoff_6h" \
      '.items[] | select(.status.phase=="Running" or .status.phase=="Pending") | select(.status.containerStatuses != null) | select([.status.containerStatuses[]? | .state.waiting.reason=="CrashLoopBackOff" or .state.waiting.reason=="ImagePullBackOff" or .state.waiting.reason=="ErrImagePull"] | any) | select(.metadata.creationTimestamp < $cutoff) | "\(.metadata.namespace) \(.metadata.name)"' "$TMP_PODS" \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando pod travado ha mais de 6h: $name (ns=$ns)"
          kubectl delete pod "$name" -n "$ns" --ignore-not-found=true
        done

    echo "--- Removendo ReplicaSets vazios (0 desejados / 0 atuais) ---"
    kubectl get rs --all-namespaces -o json \
      | jq -r '.items[] | select((.spec.replicas // 0) == 0 and (.status.replicas // 0) == 0) | "\(.metadata.namespace) \(.metadata.name)"' \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando ReplicaSet vazio $name (ns=$ns)"
          kubectl delete rs "$name" -n "$ns" --ignore-not-found=true
        done

    # --- ReplicaSets orfaos: 1 chamada de deployments em vez de N chamadas ---
    echo "--- Removendo ReplicaSets orfaos (owner Deployment nao existe mais) ---"
    kubectl get deployments --all-namespaces -o json > "$TMP_DEPLOYS"

    kubectl get rs --all-namespaces -o json \
      | jq -r --slurpfile deploys "$TMP_DEPLOYS" '
          ($deploys[0].items | map(.metadata.namespace + "/" + .metadata.name)) as $existing
          | .items[]
          | select(.metadata.ownerReferences != null)
          | select(.metadata.ownerReferences[0].kind=="Deployment")
          | select(([.metadata.namespace + "/" + .metadata.ownerReferences[0].name] | inside($existing)) | not)
          | "\(.metadata.namespace) \(.metadata.name)"
        ' \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando ReplicaSet orfao $name (ns=$ns)"
          kubectl delete rs "$name" -n "$ns" --ignore-not-found=true
        done

    echo "--- Removendo Jobs completados ha mais de 24h ---"
    cutoff_24h=$(date -u -d @$(( $(date +%s) - 24*3600 )) +%Y-%m-%dT%H:%M:%SZ)
    kubectl get jobs --all-namespaces -o json \
      | jq -r --arg cutoff "$cutoff_24h" \
        '.items[] | select(.status.succeeded >= 1) | select((.status.completionTime // "") != "") | select(.status.completionTime < $cutoff) | "\(.metadata.namespace) \(.metadata.name)"' \
      | while read -r ns name; do
          [ -z "$ns" ] && continue
          echo "Deletando Job completado ha mais de 24h: $name (ns=$ns)"
          kubectl delete job "$name" -n "$ns" --ignore-not-found=true
        done

    echo "===== [$(date)] Limpeza concluida ====="
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-cleanup
  namespace: cluster-tools
spec:
  schedule: 0 * * * *
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        spec:
          serviceAccountName: cluster-cleanup
          restartPolicy: Never
          containers:
            - name: cleanup
              image: alpine/k8s:1.36.2
              command:
                - /bin/sh
                - /scripts/cleanup.sh
              volumeMounts:
                - name: script
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: script
              configMap:
                name: cluster-cleanup-script
                defaultMode: 493
