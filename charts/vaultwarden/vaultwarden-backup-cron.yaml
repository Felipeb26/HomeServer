apiVersion: batch/v1
kind: CronJob
metadata:
  name: vaultwarden-backup
  namespace: security
spec:
  schedule: 0 3 * * *
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: alpine:3.24
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  apk add --no-cache sqlite >/dev/null
                  timestamp=$(date +%Y%m%d-%H%M%S)
                  echo "Fazendo backup do banco em /backups/db-$timestamp.sqlite3"
                  sqlite3 /data/db.sqlite3 ".backup /backups/db-$timestamp.sqlite3"
                  echo "Removendo backups com mais de 14 dias"
                  find /backups -name "db-*.sqlite3" -mtime +14 -delete
                  echo "Backups atuais:"
                  ls -lh /backups
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: vaultwarden-pvc
            - name: backups
              hostPath:
                path: /mnt/backup-500gb/vaultwarden-backups
                type: Directory
