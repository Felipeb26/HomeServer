apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-gotify-bridge
  namespace: monitoring
  labels:
    app: alertmanager-gotify-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-gotify-bridge
  template:
    metadata:
      labels:
        app: alertmanager-gotify-bridge
    spec:
      containers:
        - name: bridge
          image: ghcr.io/druggeri/alertmanager_gotify_bridge:master
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GOTIFY_ENDPOINT
              value: http://gotify.core.svc.cluster.local/message
            - name: GOTIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gotify-bridge-token
                  key: GOTIFY_TOKEN
            - name: DEFAULT_PRIORITY
              value: "5"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-gotify-bridge
  namespace: monitoring
spec:
  selector:
    app: alertmanager-gotify-bridge
  ports:
    - name: http
      port: 8080
      targetPort: 8080
