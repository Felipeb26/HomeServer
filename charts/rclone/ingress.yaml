apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rclone
  namespace: core
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rclone.batsworks.com.br
      secretName: tls-rclone
  rules:
    - host: rclone.batsworks.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rclone
                port:
                  number: 5572
