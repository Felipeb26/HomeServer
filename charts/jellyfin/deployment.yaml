apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      securityContext:
        supplementalGroups:
          - 992
          - 44
      runtimeClassName: nvidia
      containers:
        - name: jellyfin
          image: linuxserver/jellyfin:latest
          ports:
            - containerPort: 8096
          env:
            - name: TZ
              value: America/Sao_Paulo
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: JELLYFIN_FFmpeg__HardwareAccelerationType
              value: nvenc
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,video,utility
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 3Gi
              cpu: 2000m
              nvidia.com/gpu: 1
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - name: transcode
              mountPath: /transcode
      volumes:
        - name: config
          hostPath:
            path: /mnt/ext_ssh_bk/configs/jellyfin
            type: DirectoryOrCreate
        - name: data
          hostPath:
            path: /mnt/big_storage/Torrent
            type: DirectoryOrCreate
        - name: transcode
          hostPath:
            path: /mnt/big_storage/transcode  # ← era Memory, agora disco
            type: DirectoryOrCreate