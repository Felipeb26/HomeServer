apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-shared
  namespace: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-shared
  template:
    metadata:
      labels:
        app: postgres-shared
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: tensorchord/pgvecto-rs:pg14-v0.2.0
          ports:
            - containerPort: 5432
          env:
            - name: TZ
              value: America/Sao_Paulo
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_INITDB_ARGS
              value: --auth-host=scram-sha-256 --data-checksums
            - name: POSTGRES_HOST_AUTH_METHOD
              value: scram-sha-256
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - -c
            - shared_preload_libraries=vectors.so
            - -c
            - search_path='',public,vectors,drizzle
            - -c
            - max_connections=100
            - -c
            - shared_buffers=256MB
            - -c
            - effective_cache_size=1GB
            - -c
            - maintenance_work_mem=64MB
            - -c
            - work_mem=4MB
            - -c
            - wal_buffers=8MB
            - -c
            - min_wal_size=256MB
            - -c
            - max_wal_size=1GB
            - -c
            - checkpoint_completion_target=0.9
            - -c
            - random_page_cost=1.1
            - -c
            - idle_in_transaction_session_timeout=30000
            - -c
            - statement_timeout=60000
            - -c
            - tcp_keepalives_idle=60
            - -c
            - tcp_keepalives_interval=10
            - -c
            - tcp_keepalives_count=5
            - -c
            - max_parallel_workers_per_gather=2
            - -c
            - max_parallel_workers=4
            - -c
            - max_worker_processes=4
            - -c
            - autovacuum_vacuum_scale_factor=0.05
            - -c
            - autovacuum_analyze_scale_factor=0.02
            - -c
            - autovacuum_vacuum_cost_delay=10ms
            - -c
            - log_min_duration_statement=1000
            - -c
            - log_temp_files=0
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          hostPath:
            path: /mnt/ext_ssh_bk/postgres
            type: DirectoryOrCreate
        - name: init-script
          configMap:
            name: postgres-init
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-shared
  namespace: core
spec:
  selector:
    app: postgres-shared
  ports:
    - port: 5432
      targetPort: 5432