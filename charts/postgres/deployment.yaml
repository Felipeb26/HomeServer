apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-shared-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /home/felipes/pgdata
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - batsworks-elite
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-shared-pvc
  namespace: core
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-shared
  namespace: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-shared
  template:
    metadata:
      labels:
        app: postgres-shared
    spec:
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvectors0.2.0
          ports:
            - containerPort: 5432
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - pg_ctl stop -D /var/lib/postgresql/data/pgdata -m fast
          env:
            - name: TZ
              value: America/Sao_Paulo
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_INITDB_ARGS
              value: --auth-host=scram-sha-256 --data-checksums
            - name: POSTGRES_HOST_AUTH_METHOD
              value: scram-sha-256
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - -c
            - shared_preload_libraries=vchord.so,vectors.so
            - -c
            - search_path='',public,vectors,drizzle
            - -c
            - max_connections=200
            - -c
            - shared_buffers=1GB
            - -c
            - effective_cache_size=3GB
            - -c
            - work_mem=8MB
            - -c
            - maintenance_work_mem=512MB
            - -c
            - wal_buffers=32MB
            - -c
            - min_wal_size=512MB
            - -c
            - max_wal_size=2GB
            - -c
            - checkpoint_completion_target=0.9
            - -c
            - random_page_cost=1.1
            - -c
            - idle_in_transaction_session_timeout=30000
            - -c
            - statement_timeout=120000
            - -c
            - tcp_keepalives_idle=60
            - -c
            - tcp_keepalives_interval=10
            - -c
            - tcp_keepalives_count=5
            - -c
            - max_parallel_workers_per_gather=4
            - -c
            - max_parallel_workers=8
            - -c
            - max_worker_processes=8
            - -c
            - autovacuum_vacuum_scale_factor=0.05
            - -c
            - autovacuum_analyze_scale_factor=0.02
            - -c
            - autovacuum_vacuum_cost_delay=10ms
            - -c
            - log_min_duration_statement=1000
            - -c
            - log_temp_files=0
          resources:
            requests:
              cpu: 250m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 5Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-shared-pvc
        - name: init-script
          configMap:
            name: postgres-init
            defaultMode: 493
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-shared
  namespace: core
spec:
  selector:
    app: postgres-shared
  ports:
    - port: 5432
      targetPort: 5432
