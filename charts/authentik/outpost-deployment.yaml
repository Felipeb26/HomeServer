apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-proxy-outpost
  namespace: security
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: authentik-proxy-outpost
  template:
    metadata:
      labels:
        app: authentik-proxy-outpost
    spec:
      containers:
        - name: proxy
          image: ghcr.io/goauthentik/proxy:2026.5.2
          env:
            - name: AUTHENTIK_HOST
              value: "https://authentik.batsworks.com.br"
            - name: AUTHENTIK_INSECURE
              value: "false"
            - name: AUTHENTIK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: authentik-outpost-secret
                  key: token
          ports:
            - containerPort: 9000
            - containerPort: 9443
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-proxy-outpost
  namespace: security
spec:
  selector:
    app: authentik-proxy-outpost
  ports:
    - name: http
      port: 9000
      targetPort: 9000
    - name: https
      port: 9443
      targetPort: 9443
