apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: security
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: authentik-server
  template:
    metadata:
      labels:
        app: authentik-server
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2026.5.2
          args:
            - server
          ports:
            - containerPort: 9000
            - containerPort: 9443
          env:
            - name: TZ
              value: America/Sao_Paulo
            - name: AUTHENTIK_REDIS__HOST
              value: redis-shared.core.svc.cluster.local
            - name: AUTHENTIK_REDIS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: postgres-shared.core.svc.cluster.local
            - name: AUTHENTIK_POSTGRESQL__USER
              value: postgres
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: secret-key
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 1000m
          volumeMounts:
            - name: data
              mountPath: /data
            - name: certs
              mountPath: /certs
            - name: templates
              mountPath: /templates
      volumes:
        - name: data
          hostPath:
            path: /mnt/ext_ssh_bk/authentik/data
            type: DirectoryOrCreate
        - name: certs
          hostPath:
            path: /mnt/ext_ssh_bk/authentik/certs
            type: DirectoryOrCreate
        - name: templates
          hostPath:
            path: /mnt/ext_ssh_bk/authentik/templates
            type: DirectoryOrCreate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: security
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: authentik-worker
  template:
    metadata:
      labels:
        app: authentik-worker
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2026.5.2
          args:
            - worker
          env:
            - name: TZ
              value: America/Sao_Paulo
            - name: AUTHENTIK_REDIS__HOST
              value: redis-shared.core.svc.cluster.local
            - name: AUTHENTIK_REDIS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: postgres-shared.core.svc.cluster.local
            - name: AUTHENTIK_POSTGRESQL__USER
              value: postgres
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: secret-key
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 1000m
          volumeMounts:
            - name: data
              mountPath: /data
            - name: certs
              mountPath: /certs
            - name: templates
              mountPath: /templates
      volumes:
        - name: data
          hostPath:
            path: /mnt/ext_ssh_bk/authentik/data
            type: DirectoryOrCreate
        - name: certs
          hostPath:
            path: /mnt/ext_ssh_bk/authentik/certs
            type: DirectoryOrCreate
        - name: templates
          hostPath:
            path: /mnt/ext_ssh_bk/authentik/templates
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: security
spec:
  selector:
    app: authentik-server
  ports:
    - name: http
      port: 9000
      targetPort: 9000
    - name: https
      port: 9443
      targetPort: 9443
