apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "87.10.1"
    helm:
      values: |
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeProxy:
          enabled: false
        grafana:
          replicas: 1
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.batsworks.com.br
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        prometheus:
          prometheusSpec:
            replicas: 1
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 2Gi
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - prometheus.batsworks.com.br
        alertmanager:
          alertmanagerSpec:
            replicas: 1
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - alertmanager.batsworks.com.br
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
