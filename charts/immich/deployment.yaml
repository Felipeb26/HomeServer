apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      runtimeClassName: nvidia
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          ports:
            - containerPort: 2283
          env:
            - name: TZ
              value: America/Sao_Paulo
            - name: NODE_ENV
              value: production
            - name: NODE_OPTIONS
              value: --max-old-space-size=1024
            - name: DB_HOSTNAME
              value: postgres-shared.core.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              value: postgres
            - name: DB_DATABASE_NAME
              value: immich
            - name: IMMICH_WORKERS
              value: "1"
            - name: IMMICH_CONCURRENCY
              value: "2"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: REDIS_HOSTNAME
              value: redis-shared.core.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-machine-learning.immich.svc.cluster.local:3003
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 3Gi
              cpu: 2000m
              nvidia.com/gpu: 1
          volumeMounts:
            - name: upload
              mountPath: /usr/src/app/upload
            - name: library
              mountPath: /mnt/library
            - name: dri
              mountPath: /dev/dri
      volumes:
        - name: upload
          hostPath:
            path: /mnt/ext_ssh_bk/immich/Gallery/immich
            type: DirectoryOrCreate
        - name: library
          hostPath:
            path: /mnt/big_storage/immich/library
            type: DirectoryOrCreate
        - name: dri
          hostPath:
            path: /dev/dri
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
    spec:
      runtimeClassName: nvidia
      containers:
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:release
          ports:
            - containerPort: 3003
          env:
            - name: TZ
              value: America/Sao_Paulo
            - name: TRANSFORMERS_CACHE
              value: /cache
            - name: MACHINE_LEARNING_CACHE_FOLDER
              value: /cache
            - name: MACHINE_LEARNING_WORKERS
              value: "1"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 2.75Gi
              cpu: 2000m
              nvidia.com/gpu: 1
          volumeMounts:
            - name: cache
              mountPath: /cache
      volumes:
        - name: cache
          hostPath:
            path: /mnt/ext_ssh_bk/immich/model-cache
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: immich
spec:
  selector:
    app: immich-server
  ports:
    - port: 2283
      targetPort: 2283
---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  selector:
    app: immich-machine-learning
  ports:
    - port: 3003
      targetPort: 3003
