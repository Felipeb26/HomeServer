apiVersion: apps/v1
kind: Deployment
metadata:
    name: radarr
    namespace: media
spec:
    replicas: 1
    selector:
        matchLabels:
            app: radarr
    template:
        metadata:
            labels:
                app: radarr
        spec:
            containers:
                - name: radarr
                  image: linuxserver/radarr:6.2.1
                  ports:
                      - containerPort: 7878
                  env:
                      - name: TZ
                        value: America/Sao_Paulo
                      - name: PUID
                        value: "1000"
                      - name: PGID
                        value: "1000"
                      - name: UMASK
                        value: "002"
                  resources:
                      requests:
                          cpu: 50m
                          memory: 256Mi
                      limits:
                          cpu: 300m
                          memory: 768Mi
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 7878
                      initialDelaySeconds: 60
                      periodSeconds: 30
                      failureThreshold: 3
                      timeoutSeconds: 5
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 7878
                      initialDelaySeconds: 45
                      periodSeconds: 10
                      failureThreshold: 2
                      timeoutSeconds: 3
                  volumeMounts:
                      - name: config
                        mountPath: /config
                      - name: data
                        mountPath: /data
            volumes:
                - name: config
                  hostPath:
                      path: /mnt/seagate-2tb/arr/radarr
                      type: DirectoryOrCreate
                - name: data
                  hostPath:
                      path: /mnt/red-wd/Torrent
                      type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
    name: radarr
    namespace: media
spec:
    selector:
        app: radarr
    ports:
        - port: 7878
          targetPort: 7878
