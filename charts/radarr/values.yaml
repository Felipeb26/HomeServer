image:
  repository: lscr.io/linuxserver/radarr
  tag: latest

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 350Mi
    cpu: 500m

persistence:
  config:
    enabled: true
    existingClaim: pvc-radarr-config
  media:
    enabled: true
    existingClaim: pvc-big-storage

env:
  TZ: America/Sao_Paulo
  PUID: "1000"
  PGID: "1000"
