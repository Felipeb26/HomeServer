apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: libretranslate
  namespace: media
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: nginx
  rules:
    - host: libretranslate.batsworks.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: libretranslate
                port:
                  number: 5000
  tls:
    - hosts:
        - libretranslate.batsworks.com.br
      secretName: tls-libretranslate
