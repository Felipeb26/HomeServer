---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: libretranslate
  namespace: media
  labels:
    app: libretranslate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: libretranslate
  template:
    metadata:
      labels:
        app: libretranslate
    spec:
      containers:
        - name: libretranslate
          image: libretranslate/libretranslate:latest
          ports:
            - containerPort: 5000
          env:
            - name: TZ
              value: America/Sao_Paulo
            - name: LT_LOAD_ONLY
              value: "en,pt,ja,ko,zh,pb,ru,es,fr,it,de"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /home/libretranslate/.local/share/argos-translate
      volumes:
        - name: data
          hostPath:
            path: /mnt/tank-hd/libretranslate
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: libretranslate
  namespace: media
spec:
  selector:
    app: libretranslate
  ports:
    - port: 5000
      targetPort: 5000