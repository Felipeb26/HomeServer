image:
  registry: docker.io
  repository: louislam/uptime-kuma
  tag: ''
  flavor: slim-rootless
  pullPolicy: IfNotPresent

controller:
  enabled: true
  kind: Deployment
  replicas: 1

service:
  enabled: true
  type: ClusterIP

persistence:
  data:
    enabled: true
    existingClaim: pvc-uptime-kuma

env:
  TZ:
    value: America/Sao_Paulo

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hosts:
    - host: uptime.batsworks.com.br
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - uptime.batsworks.com.br
      secretName: tls-uptime-kuma
