persistentVolumeClaim:
  create: false

extraVolumes:
  - name: data
    hostPath:
      path: /mnt/tank-hd/uptime-kuma
      type: DirectoryOrCreate

extraVolumeMounts:
  - name: data
    mountPath: /app/data

service:
  enabled: true
  type: ClusterIP

env:
  - name: TZ
    value: America/Sao_Paulo

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hosts:
    - host: uptime.batsworks.com.br
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - uptime.batsworks.com.br
      secretName: tls-uptime-kuma
