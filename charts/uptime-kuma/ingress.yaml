apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uptime-kuma
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-redirect-from: http://batsworks-elite.tailb70290.ts.net/
    nginx.ingress.kubernetes.io/proxy-redirect-to: http://batsworks-elite.tailb70290.ts.net/uptime/
spec:
  ingressClassName: nginx
  rules:
    - host: uptime.batsworks.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uptime-kuma-web
                port:
                  number: 3001
    - host: batsworks-elite.tailb70290.ts.net
      http:
        paths:
          - path: /uptime(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: uptime-kuma-web
                port:
                  number: 3001
  tls:
    - hosts:
        - uptime.batsworks.com.br
      secretName: tls-uptime-kuma