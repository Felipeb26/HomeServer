apiVersion: apps/v1
kind: Deployment
metadata:
    name: qbittorrent
    namespace: media
spec:
    replicas: 1
    selector:
        matchLabels:
            app: qbittorrent
    template:
        metadata:
            labels:
                app: qbittorrent
        spec:
            containers:
                - name: qbittorrent
                  image: linuxserver/qbittorrent:5.2.2-libtorrentv1
                  ports:
                      - containerPort: 8080
                        name: webui
                      - containerPort: 59883
                        name: torrent-tcp
                        protocol: TCP
                        hostPort: 59883
                      - containerPort: 59883
                        name: torrent-udp
                        protocol: UDP
                        hostPort: 59883
                  env:
                      - name: TZ
                        value: America/Sao_Paulo
                      - name: PUID
                        value: "1000"
                      - name: PGID
                        value: "1000"
                      - name: UMASK
                        value: "002"
                      - name: WEBUI_PORT
                        value: "8080"
                  resources:
                      requests:
                          cpu: 100m
                          memory: 256Mi
                      limits:
                          cpu: 500m
                          memory: 1Gi
                  livenessProbe:
                      tcpSocket:
                          port: 8080
                      initialDelaySeconds: 180
                      periodSeconds: 30
                      failureThreshold: 3
                      timeoutSeconds: 5
                  readinessProbe:
                      tcpSocket:
                          port: 8080
                      initialDelaySeconds: 150
                      periodSeconds: 10
                      failureThreshold: 2
                      timeoutSeconds: 3
                  startupProbe:
                      tcpSocket:
                          port: 8080
                      failureThreshold: 60
                      periodSeconds: 5
                  volumeMounts:
                      - name: config
                        mountPath: /config
                      - name: data
                        mountPath: /data
            volumes:
                - name: config
                  hostPath:
                      path: /mnt/seagate-2tb/arr/qbittorrent
                      type: DirectoryOrCreate
                - name: data
                  hostPath:
                      path: /mnt/red-wd/Torrent
                      type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
    name: qbittorrent
    namespace: media
spec:
    selector:
        app: qbittorrent
    ports:
        - name: webui
          port: 8080
          targetPort: 8080
        - name: torrent-tcp
          port: 59883
          targetPort: 59883
          protocol: TCP
        - name: torrent-udp
          port: 59883
          targetPort: 59883
          protocol: UDP
