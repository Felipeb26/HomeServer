image:
  repository: lscr.io/linuxserver/qbittorrent
  tag: latest

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 1Gi
    cpu: 1000m

persistence:
  config:
    enabled: true
    existingClaim: pvc-qbittorrent-config
  downloads:
    enabled: true
    existingClaim: pvc-big-storage

env:
  TZ: America/Sao_Paulo
  PUID: "1000"
  PGID: "1000"
  WEBUI_PORT: "8080"
